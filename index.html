<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>MICHAELXMACHINA</title>
  <style>
    html, body {
      margin: 0;
      padding: 0;
      min-height: 100vh;
    }
    body {
      font-family: sans-serif;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      background-color: #000;
      color: #fff;
      text-align: center;
      padding: 0.5rem;
      box-sizing: border-box;
    }
    p {
      font-size: clamp(1.1rem, 2.5vw, 1.25rem);
      max-width: 90vw;
      margin-top: 1em;
      line-height: 1.5;
    }
    .social-icons {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 1.5em;
      margin-top: 2em;
    }
    .social-icons a img {
      width: 36px;
      height: 36px;
      border-radius: 8px;
      transition: transform 0.2s ease, box-shadow 0.2s ease;
    }
    .social-icons a img:hover {
      transform: scale(1.15);
      box-shadow: 0 0 6px rgba(255, 255, 255, 0.5);
    }
    .logo {
      width: clamp(400px, 95vw, 500px);
      height: auto;
      margin-bottom: 1.5rem;
    }
  </style>
</head>
<body>
  <img src="assets/mxmlogo.png" alt="MichaelxMachina Logo" class="logo" />
  <p><strong>Poet. Technologist. Systems Builder.</strong><br><br>
     Memetic experiments in stories and systems.<br>
     Also just a dude tryna survive the Singularity</p>
  <div class="social-icons">
    <a href="https://www.linkedin.com/in/michaelxmachina" target="_blank">
      <img src="https://img.icons8.com/ios-filled/50/ffffff/linkedin.png" alt="LinkedIn">
    </a>
    <a href="https://www.instagram.com/michaelxmachina" target="_blank">
      <img src="https://img.icons8.com/ios-filled/50/ffffff/instagram-new.png" alt="Instagram">
    </a>
    <a href="https://x.com/michaelxmachina" target="_blank">
      <img src="https://img.icons8.com/ios-filled/50/ffffff/twitterx.png" alt="X (Twitter)">
    </a>
    <a href="https://youtube.com/@michael.x.machina" target="_blank">
      <img src="https://img.icons8.com/ios-filled/50/ffffff/youtube-play.png" alt="YouTube">
    </a>
  </div>
</body>
</html>
