<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>MICHAELXMACHINA</title>
  <link href="https://fonts.googleapis.com/css2?family=Work+Sans:wght@500&display=swap" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500&display=swap" rel="stylesheet">
  <style>
    html, body {
      margin: 0;
      padding: 0;
      min-height: 80vh;
    }
    body {
      font-family: sans-serif;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      background-color: #060606;
      color: #dadada;
      text-align: center;
      padding: 0.5rem;
      box-sizing: border-box;
      font-size: 1.1rem; /* slightly larger */
    }
    h1 {
      font-size: clamp(1.25rem, 3vw, 1.75rem);
      margin: 0.2em 0 0.2em;
      margin-bottom: 0.25em;
      font-weight: 600;
      line-height: 1.1;
    }
    h2 {
      font-size: clamp(1.25rem, 2vw, 1.75rem);
      margin: 0.2em 0 0.2em;
      font-weight: 400;
    }
    p {
      font-size: clamp(1rem, 2.5vw, 1.25rem);
      max-width: 95vw;
      margin-top:  0em;
      margin-bottom: 0.75em;
      line-height: 1.1;
    }
    .social-icons {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 1.5em;
      margin-top: 0.5rem;
      margin-bottom: 0.25rem;
    }
    .social-icons a img {
      width: 36px;
      height: 36px;
      border-radius: 8px;
      transition: transform 0.2s ease, box-shadow 0.2s ease;
    }
    .social-icons a img:hover {
      transform: scale(1.15);
      box-shadow: 0 0 6px rgba(218, 218, 218, 0.5);
    }
    .tagline {
      display: grid;
      grid-template-columns: 1fr auto 1fr;
      grid-template-rows: auto auto auto;
      column-gap: 0.7em;
      row-gap: 0.05em;
      margin: 0.5em 0 1em;
      width: clamp(340px, 78vw, 560px);
      max-width: 95vw;
      font-size: clamp(1.25rem, 3vw, 1.75rem);
      font-weight: 600;
      align-items: baseline;
      justify-content: center;
    }
    .cell.left {
      text-align: right;
      justify-self: end;
      align-self: baseline;
      white-space: nowrap;
    }
    .cell.right {
      text-align: left;
      justify-self: start;
      align-self: baseline;
      white-space: nowrap;
    }
    .cell.major {
      font-size: 1.38em;
    }
    .cell.minor {
      font-size: 0.75em;
    }
    .cell.mid {
      font-weight: 300;
      font-size: 0.55em;
      color: #888;
      letter-spacing: 0.05em;
      text-align: center;
      justify-self: center;
      align-self: baseline;
    }
    .cell.mid.x {
      font-size: 1.6em;
      font-weight: 700;
      color: #dadada;
      letter-spacing: normal;
    }
    .cell.empty {
      visibility: hidden;
    }
    .logo {
      width: clamp(400px, 105vw, 500px);
      height: auto;
      margin-top: .5rem;
      margin-bottom: .5rem;
    }
    .nav-links {
      display: flex;
      justify-content: space-between;
      align-items: center;
      width: 100%;
      max-width: 600px;
      margin-top: 0.25rem;
      margin-bottom: 0.5rem;
      font-size: clamp(1rem, 2vw, 1.1rem);
      flex-wrap: nowrap;
      gap: 0.75em;
    }

    .nav-links a {
      color: #dadada;
      text-decoration: none;
      transition: all 0.2s ease;
      padding: 0.4em 0.8em;
      border: 1px solid #dadada;
      border-radius: 999px;
      background-color: rgba(218, 218, 218, 0.08);
      font-weight: 500;
      font-family: 'Work Sans', sans-serif;
      text-align: center;
      flex-grow: 1;
      flex-basis: 30%;
      font-size: 0.85rem;
      text-shadow: 0 0 1px rgba(0, 0, 0, 0.3);
      white-space: pre-line;
      word-break: break-word;
    }
  </style>
</head>
<body>
  <img src="assets/mxmlogo.png" alt="MichaelxMachina Logo" class="logo" />
  <div class="tagline">
    <span class="cell left major">stories</span>
    <span class="cell mid x">X</span>
    <span class="cell right major">systems</span>

    <span class="cell empty">·</span>
    <span class="cell mid">for</span>
    <span class="cell empty">·</span>

    <span class="cell left minor">sovereign</span>
    <span class="cell mid"></span>
    <span class="cell right minor">singularity</span>
  </div>
  <div class="social-icons">
    <a href="https://www.linkedin.com/in/michaelxmachina" target="_blank">
      <img src="https://img.icons8.com/ios-filled/50/dadada/linkedin.png" alt="LinkedIn">
    </a>
    <a href="https://www.instagram.com/michaelxmachina" target="_blank">
      <img src="https://img.icons8.com/ios-filled/50/dadada/instagram-new.png" alt="Instagram">
    </a>
    <a href="https://x.com/michaelxmachina" target="_blank">
      <img src="https://img.icons8.com/ios-filled/50/dadada/twitterx.png" alt="X (Twitter)">
    </a>
    <a href="https://youtube.com/@michael.x.machina" target="_blank">
      <img src="https://img.icons8.com/ios-filled/50/dadada/youtube-play.png" alt="YouTube">
    </a>
  </div>  
  <p>
    michaelXmachina work in progress.<br>
    Past work below.
  </p>
  <div class="nav-links">
    <a href="https://inverseK.com/services" target="_blank">TECHNICAL POETRY</a>
    <a href="https://symantic.studio" target="_blank">NARRATIVE STRATEGY</a>
  </div>
</body>
</html>
