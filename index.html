<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>MICHAELXMACHINA</title>
  <link href="https://fonts.googleapis.com/css2?family=Work+Sans:wght@500&display=swap" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500&display=swap" rel="stylesheet">
  <style>
    html, body {
      margin: 0;
      padding: 0;
      min-height: 80vh;
    }
    body {
      font-family: sans-serif;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      background-color: #060606;
      color: #dadada;
      text-align: center;
      padding: 0.5rem;
      box-sizing: border-box;
      font-size: 1.1rem; /* slightly larger */
    }
    h1 {
      font-size: clamp(1.25rem, 3vw, 1.75rem);
      margin: 0.2em 0 0.2em;
      margin-bottom: 0.25em;
      font-weight: 600;
      line-height: 1.1;
    }
    h2 {
      font-size: clamp(1.25rem, 2vw, 1.75rem);
      margin: 0.2em 0 0.2em;
      font-weight: 400;
    }
    p {
      font-size: clamp(1rem, 2.5vw, 1.25rem);
      max-width: 95vw;
      margin-top:  0em;
      margin-bottom: 0.75em;
      line-height: 1.1;
    }
    .social-icons {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 1.5em;
      margin-top: 0.5rem;
      margin-bottom: 0.25rem;
    }
    .social-icons a img {
      width: 36px;
      height: 36px;
      border-radius: 8px;
      transition: transform 0.2s ease, box-shadow 0.2s ease;
    }
    .social-icons a img:hover {
      transform: scale(1.15);
      box-shadow: 0 0 6px rgba(218, 218, 218, 0.5);
    }
    .logo {
      width: clamp(400px, 95vw, 500px);
      height: auto;
      margin-top: 2.25rem;
      margin-bottom: 1.25rem;
    }
    .nav-links {
      display: flex;
      justify-content: space-between;
      align-items: center;
      width: 100%;
      max-width: 600px;
      margin-top: 0.25rem;
      margin-bottom: 0.5rem;
      font-size: clamp(1rem, 2vw, 1.1rem);
      flex-wrap: nowrap;
      gap: 0.75em;
    }

    .nav-links a {
      color: #dadada;
      text-decoration: none;
      transition: all 0.2s ease;
      padding: 0.4em 0.8em;
      border: 1px solid #dadada;
      border-radius: 999px;
      background-color: rgba(218, 218, 218, 0.08);
      font-weight: 500;
      font-family: 'Work Sans', sans-serif;
      text-align: center;
      flex-grow: 1;
      flex-basis: 30%;
      font-size: 0.85rem;
      text-shadow: 0 0 1px rgba(0, 0, 0, 0.3);
      white-space: pre-line;
      word-break: break-word;
    }
  </style>
</head>
<body>
  <img src="assets/mxmlogo.jpeg" alt="MichaelxMachina Logo" class="logo" />
  <h1>Stories & Systems<br>
  <h2>For Compassionate Alignment</h2>
  <h3>Of All Sensing Systems</h3>
  <h3><i>From Carbon To Silicon</i></h3>
  <p>
    MICHAELXMACHINA work in progress.<br>
    Past work below.
  </p>
  <div class="nav-links">
    <a href="https://inverseK.com/services" target="_blank">TECHNICAL POETRY</a>
    <a href="https://symantic.studio" target="_blank">NARRATIVE STRATEGY</a>
  </div>
  <div class="social-icons">
    <a href="https://www.linkedin.com/in/michaelxmachina" target="_blank">
      <img src="https://img.icons8.com/ios-filled/50/dadada/linkedin.png" alt="LinkedIn">
    </a>
    <a href="https://www.instagram.com/inverse_k" target="_blank">
      <img src="https://img.icons8.com/ios-filled/50/dadada/instagram-new.png" alt="Instagram">
    </a>
    <a href="https://x.com/michaelxmachina" target="_blank">
      <img src="https://img.icons8.com/ios-filled/50/dadada/twitterx.png" alt="X (Twitter)">
    </a>
    <a href="https://youtube.com/@michael.x.machina" target="_blank">
      <img src="https://img.icons8.com/ios-filled/50/dadada/youtube-play.png" alt="YouTube">
    </a>
  </div>
</body>
</html>
