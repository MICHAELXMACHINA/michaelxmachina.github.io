<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>MICHAELXMACHINA</title>
  <style>
    html, body {
      margin: 0;
      padding: 0;
      min-height: 80vh;
    }
    body {
      font-family: sans-serif;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      background-color: #000;
      color: #fff;
      text-align: center;
      padding: 0.5rem;
      box-sizing: border-box;
      font-size: 1.1rem; /* slightly larger */
    }
    h1 {
      font-size: clamp(1.25rem, 3vw, 1.75rem);
      margin: 0.2em 0 0.3em;
      font-weight: 600;
    }
    p {
      font-size: clamp(1rem, 2.5vw, 1.25rem);
      max-width: 95vw;
      margin-top:  0.25em;
      line-height: 1.35;
    }
    .social-icons {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 1.5em;
      margin-top: 0.5em;
    }
    .social-icons a img {
      width: 36px;
      height: 36px;
      border-radius: 8px;
      transition: transform 0.2s ease, box-shadow 0.2s ease;
    }
    .social-icons a img:hover {
      transform: scale(1.15);
      box-shadow: 0 0 6px rgba(255, 255, 255, 0.5);
    }
    .logo {
      width: clamp(400px, 95vw, 500px);
      height: auto;
      margin-bottom: 1.5rem;
    }
    .nav-links {
      margin-top: 1.25rem;
      margin-bottom: 1.25rem;
      font-size: clamp(1rem, 2vw, 1.1rem);
    }

    .nav-links a {
      color: white;
      text-decoration: none;
      margin: 0 0.4em;
      transition: all 0.2s ease;
      padding: 0.5em 1.2em;
      border: 1px solid white;
      border-radius: 999px;
      background-color: rgba(255, 255, 255, 0.05);
      font-weight: 500;
      display: inline-block;
    }

    .nav-links a:hover {
      opacity: 0.85;
      background-color: rgba(255, 255, 255, 0.2);
    }
  </style>
</head>
<body>
  <img src="assets/mxmlogo.png" alt="MichaelxMachina Logo" class="logo" />
  <h1>Memetic Engineer</h1>
  <p>
    Stories and systems to survive the Singularity.<br>
    Poetics and protocols for posthuman prosperity.
  </p>
  <div class="nav-links">
    <a href="https://symantic.studio" target="_blank">Strategy</a>
    <a href="https://inverseK.com" target="_blank">Poetry</a>
    <a href="https://gear.science" target="_blank">Tools</a>
  </div>
  <div class="social-icons">
    <a href="https://www.linkedin.com/in/michaelxmachina" target="_blank">
      <img src="https://img.icons8.com/ios-filled/50/ffffff/linkedin.png" alt="LinkedIn">
    </a>
    <a href="https://www.instagram.com/michaelxmachina" target="_blank">
      <img src="https://img.icons8.com/ios-filled/50/ffffff/instagram-new.png" alt="Instagram">
    </a>
    <a href="https://x.com/michaelxmachina" target="_blank">
      <img src="https://img.icons8.com/ios-filled/50/ffffff/twitterx.png" alt="X (Twitter)">
    </a>
    <a href="https://youtube.com/@michael.x.machina" target="_blank">
      <img src="https://img.icons8.com/ios-filled/50/ffffff/youtube-play.png" alt="YouTube">
    </a>
  </div>
